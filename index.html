<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Skincare</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: url('https://cdn.shopify.com/s/files/1/0727/3948/7919/files/efeb94f0e623e9e241822326c78e214a_1.jpg?v=1774958764') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* DARK OVERLAY */
        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            top: 0;
            left: 0;
        }

        /* CONTENT */
        .hero-content {
            position: relative;
            text-align: center;
            color: #fff;
            max-width: 700px;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 48px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #6BAF92;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #1F3D2B;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            .hero-content h1 {
                font-size: 32px;
            }
        }

    </style>
</head>

<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>Skincare for Healthy & Glowing Skin</h1>
            <p>
                Natural ingredients. Visible results. Feel confident in your skin every day.
            </p>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </section>

</body>
</html>
